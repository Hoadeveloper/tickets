<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Tickets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body{background:#f4f6f9}
    .appbar{height:48px;background:#2d2d2d;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600}
    .wrap{max-width:760px;margin:0 auto;padding:16px}
    .ticket-card{width:360px;border-radius:16px;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.12);background:#fff;margin:0 auto}
    .ticket-top{background:#3f6fe8;color:#fff;padding:16px 20px;display:flex;justify-content:space-between;font-weight:600}
    .ticket-hero{height:220px;background:linear-gradient(#e6e9ef,#0b0b0b);display:flex;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden}
    .ticket-body{padding:22px}
    .btn-primary{background:#3f6fe8;border-color:#3f6fe8}
    .tm-verified{background:#2f61ce;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;font-weight:600}
    .dots{display:flex;gap:10px;justify-content:center;margin:14px 0}
    .dot{width:10px;height:10px;border-radius:999px;background:#d1d5db;cursor:pointer}
    .dot.active{background:#3f6fe8}
    .actions{display:flex;gap:16px;justify-content:center;margin-top:8px}
    .actions .btn{min-width:160px;padding:.8rem 1rem;border-radius:10px}
    .badge-pill{border:1px dashed rgba(255,255,255,.55);border-radius:999px;padding:2px 10px;font-size:.75rem}
    .barcode-stub{height:40px;background:#e9efff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:600}
    .form-hint{font-size:.85rem;color:#6b7280}
  </style>
</head>
<body>
  <div class="appbar">My Tickets</div>
  <div class="wrap">
    <div id="carouselTickets" class="carousel slide" data-bs-ride="false">
      <div class="carousel-inner" id="ticketsContainer"></div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnTransfer">Transfer</button>
      <button class="btn btn-primary" id="btnSell">Sell</button>
    </div>
  </div>

  <!-- Transfer Modal -->
  <div class="modal fade" id="transferModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="transferForm">
          <div class="modal-header">
            <h5 class="modal-title">Transfer Tickets</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Recipient Name</label>
              <input type="text" class="form-control" name="recipientName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Recipient Email</label>
              <input type="email" class="form-control" name="recipientEmail" placeholder="name@example.com" required>
              <div class="form-hint">The recipient will get an email to accept the tickets.</div>
            </div>
            <div class="mb-2">
              <label class="form-label">Select Tickets</label>
              <div id="transferTicketsList" class="list-group"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Send Transfer</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Sell Modal (mock UI) -->
  <div class="modal fade" id="sellModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="sellForm">
          <div class="modal-header">
            <h5 class="modal-title">List Tickets for Sale</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Price (each)</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" name="price" min="1" step="0.01" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Select Tickets</label>
              <div id="sellTicketsList" class="list-group"></div>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="1" id="agreeResale" required>
              <label class="form-check-label" for="agreeResale">
                I agree to the resale terms and understand tickets will be unavailable for entry while listed.
              </label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">List Tickets</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Done</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="successMessage">Action completed successfully.</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // =================== READ FORM DATA ===================
    const raw = sessionStorage.getItem('ticketData');
    let data = {};
    try { data = JSON.parse(raw || '{}'); } catch(e) { data = {}; }

    // =================== CONFIG ===================
    const SERVER_URL = window.location.origin; // use the current site origin on Replit or local

    // =================== HELPERS ===================
    function parseSeatList(primary, other, count){
      const list = [];
      const start = (primary && !isNaN(+primary)) ? +primary : 1;
      if (other && other.trim()) {
        other.split(',').forEach(s => { const n = s.trim(); if (n) list.push(n); });
        if (!list.includes(String(start))) list.unshift(String(start));
        return list.slice(0, Math.max(1, +count || 1));
      }
      const total = Math.max(1, +count || 1);
      for (let i=0;i<total;i++) list.push(String(start + i));
      return list;
    }

    function splitWhen(str) {
      if (!str) return { date: '', time: '' };
      if (str.includes('•')) {
        const [d, t] = str.split('•');
        return { date: (d||'').trim(), time: (t||'').trim() };
      }
      const [d, t] = str.split(',');
      return { date: (d||'').trim(), time: (t||'').trim() };
    }

    async function sendTransferEmail({ recipientName, recipientEmail, selectedSeats }) {
      const whenParts = splitWhen(data.tim || '');
      const tickets = selectedSeats.map(seat => ({
        sec: data.sec || "SEC",
        row: data.row || "ROW",
        seat
      }));

      const venueRaw = data.ven || "";
      const venue_name = venueRaw.split(',')[0]?.trim() || venueRaw || "Venue";
      const venue_city = venueRaw.split(',').slice(1).join(',').trim();

      const payload = {
        sender_name: data.sender_name || "Unknown Sender",
        event_title: data.tit || data.typ || "Sample Event",
        event_date: (data.tim || "").split(",")[0] || "",
        event_time: (data.tim || "").split(",")[1]?.trim() || "",
        venue_name: data.ven || "Venue",
        venue_city: "",
        image_url: data.img || "",
        accept_url: "https://www.ticketmaster.com/accept?token=dtret23",

        recipient: recipientEmail,
        tickets
      };


      const res = await fetch(`${SERVER_URL}/send-ticket`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const out = await res.json();
      if (!out.success) throw new Error(out.error || "Email send failed");
      return out.messageId; // optional
    }

    // =================== RENDER TICKETS ===================
    const title = data.tit || data.typ || 'Sample Event';
    const venue = data.ven || 'Venue';
    const when  = data.tim || '';
    const sec   = data.sec || 'SEC';
    const row   = data.row || 'ROW';
    const seat0 = data.sit || '1';
    const other = data.sub_t || '';
    const count = data.l || 1;
    const img   = (data.img && data.img.trim()) ? data.img.trim() : '';

    const seats = parseSeatList(seat0, other, count);

    const container = document.getElementById('ticketsContainer');
    const dots = document.getElementById('dots');

    seats.forEach((seat, idx) => {
      const active = idx === 0 ? 'active' : '';
      const slide = document.createElement('div');
      slide.className = `carousel-item ${active}`;
      slide.innerHTML = `
        <div class="ticket-card">
          <div class="ticket-top">
            <div>SEC <span class="badge-pill">${sec}</span></div>
            <div>ROW <span class="badge-pill">${row}</span></div>
            <div>SEAT <div class="text-end fw-bold">${seat}</div></div>
          </div>
          <div class="ticket-hero">
            ${img ? `<img src="${img}" alt="Event image" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.remove();">` : ''}
            <div style="position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:8px;font-weight:600;max-width:90%;">${title}</div>
          </div>
          <div class="ticket-body">
            <div class="barcode-stub">🔍 View Barcode</div>
            <div class="text-primary mt-3" style="font-weight:600">Ticket Details</div>
            ${when || venue ? `<div class="text-muted" style="font-size:.9rem;margin-top:6px">${when ? when + (venue ? ' · ' : '') : ''}${venue || ''}</div>` : ''}
          </div>
          <div class="tm-verified">✔ ticketmaster.verified</div>
        </div>`;
      container.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = `dot ${active && 'active'}`;
      dot.dataset.index = idx;
      dots.appendChild(dot);
    });

    // Carousel controls & active index tracking
    const carouselEl = document.getElementById('carouselTickets');
    const carousel = new bootstrap.Carousel(carouselEl);
    let activeIndex = 0;
    carouselEl.addEventListener('slid.bs.carousel', (e)=>{
      activeIndex = e.to;
      [...dots.children].forEach((d, idx)=> d.classList.toggle('active', idx===activeIndex));
    });
    dots.addEventListener('click', (e)=>{
      const t = e.target.closest('.dot');
      if(!t) return;
      carousel.to(+t.dataset.index);
    });

    // Build checkbox lists for transfer/sell
    function buildTicketsList(containerId){
      const list = document.getElementById(containerId);
      list.innerHTML = '';
      seats.forEach((seat, i)=>{
        const id = `${containerId}_seat_${i}`;
        const item = document.createElement('label');
        item.className = 'list-group-item d-flex align-items-center gap-2';
        item.innerHTML = `
          <input class="form-check-input me-2" type="checkbox" value="${seat}" id="${id}">
          <span>Sec ${sec}, Row ${row}, Seat ${seat}</span>`;
        list.appendChild(item);
      });
      // Preselect currently visible seat
      const input = document.getElementById(`${containerId}_seat_${activeIndex}`)?.querySelector('input');
      if (input) input.checked = true;
    }

    // Modals
    const transferModal = new bootstrap.Modal(document.getElementById('transferModal'));
    const sellModal = new bootstrap.Modal(document.getElementById('sellModal'));
    const successModal = new bootstrap.Modal(document.getElementById('successModal'));

    document.getElementById('btnTransfer').addEventListener('click', () => {
      buildTicketsList('transferTicketsList');
      // Prefill email from the original form if present
      const field = document.querySelector('#transferForm [name="recipientEmail"]');
      if (field && data.recipient) field.value = data.recipient;
      transferModal.show();
    });

    document.getElementById('btnSell').addEventListener('click', () => {
      buildTicketsList('sellTicketsList');
      sellModal.show();
    });

    // Submit handlers
    document.getElementById('transferForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = e.target.recipientName.value.trim();
      const email = e.target.recipientEmail.value.trim();
      const selected = [...document.querySelectorAll('#transferTicketsList input[type="checkbox"]:checked')].map(cb=>cb.value);

      if (!name) { alert('Enter recipient name.'); return; }
      if (!email) { alert('Enter recipient email.'); return; }
      if (!selected.length) { alert('Select at least one ticket.'); return; }

      try {
        const messageId = await sendTransferEmail({ recipientName: name, recipientEmail: email, selectedSeats: selected });
        transferModal.hide();
        document.getElementById('successMessage').textContent =
          `Transfer email sent to ${name} (${email}) for ${selected.length} ticket(s).` + (messageId ? ` Message ID: ${messageId}` : '');
        successModal.show();
      } catch (err) {
        transferModal.hide();
        document.getElementById('successMessage').textContent = `Failed to send transfer: ${err.message}`;
        successModal.show();
      }
    });

    document.getElementById('sellForm').addEventListener('submit', (e)=>{
      e.preventDefault();
      const price = parseFloat(e.target.price.value);
      const selected = [...document.querySelectorAll('#sellTicketsList input[type="checkbox"]:checked')].map(cb=>cb.value);
      if (isNaN(price) || price <= 0) { alert('Enter a valid price.'); return; }
      if (!selected.length) { alert('Select at least one ticket.'); return; }
      sellModal.hide();
      document.getElementById('successMessage').textContent =
        `Listed ${selected.length} ticket(s) at $${price.toFixed(2)} each. You will be notified when they sell.`;
      successModal.show();
    });
  </script>
</body>
</html>
