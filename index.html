<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <title>Ticket Master</title>
</head>
<body>
    <div class="mx-auto my-5 p-3" style="max-width: 400px;">
        <form id="ticketForm">
            <!-- ✅ New Sender Name field -->
            <div class="mb-3">
                <label class="form-label">Sender Name</label>
                <input type="text" name="sender_name" class="form-control" placeholder="Your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Headline</label>
                <input type="text" name="typ" class="form-control">
            </div>
            <div class="mb-3">
  <div class="row">
    <div class="col">
      <label class="form-label">SEC</label>
      <input type="text" name="sec" class="form-control" placeholder="SEC">
    </div>
    <div class="col">
      <label class="form-label">ROW</label>
      <input type="text" name="row" class="form-control" placeholder="ROW">
    </div>
    <div class="col">
      <label class="form-label">SIT</label>
      <input type="text" name="sit" class="form-control" placeholder="Seat Number">
    </div>
  </div>
</div>

            <div class="mb-3">
                <label class="form-label">How many tickets?</label>
                <select class="form-control" name="l" placeholder="TICKETS COUNT">
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Other SIT (OPTIONAL)</label>
                <input type="text" name="sub_t" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="tit" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Venue</label>
                <input type="text" name="ven" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" name="img" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Date & Time</label>
                <input type="text" name="tim" class="form-control">
            </div>
            <!-- ✅ Recipient Email field -->
            <div class="mb-3">
                <label class="form-label">Recipient Email</label>
                <input type="email" name="recipient" class="form-control" placeholder="recipient@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Create</button>
        </form>
    </div>

    <script>
  $(function () {
    $('#ticketForm').on('submit', function (event) {
      event.preventDefault();

      // Collect and save form values for new1.html
      const fd = $(this).serializeArray();
      const data = {};
      fd.forEach(f => data[f.name] = f.value);

      sessionStorage.setItem('ticketData', JSON.stringify(data));

      // Go to the ticket view; email will be sent from the Transfer modal there
      window.location.href = 'ntick/new1.html';
    });
  });

  // (Optional) keep your service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker
      .register('/service-worker.js')
      .then(reg => console.log('Service Worker scope:', reg.scope))
      .catch(err => console.error('SW registration failed:', err));
  }
</script>

</body>
</html>
